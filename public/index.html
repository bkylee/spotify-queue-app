<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brian's Queue — Enter Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1DB954; --bg: #0a0a0a; --surface: #141414;
      --border: rgba(255,255,255,0.08); --text: #fff;
      --text-2: rgba(255,255,255,0.55); --text-3: rgba(255,255,255,0.3); --radius: 14px;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(29,185,84,0.13) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      width: 100%; max-width: 400px; padding: 1rem;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .logo {
      width: 56px; height: 56px; background: var(--green); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 0.4rem; }
    h1 span { color: var(--green); }
    .subtitle { color: var(--text-2); font-size: 0.9rem; margin-bottom: 2.5rem; }
    .form-group { width: 100%; margin-bottom: 1rem; }
    label { display: block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 0.5rem; text-align: left; }
    input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.85rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green); }
    input::placeholder { color: var(--text-3); }
    #code-input {
      font-family: 'Courier New', monospace; font-size: 1.4rem;
      letter-spacing: 0.2em; text-align: center; text-transform: uppercase;
    }
    .btn {
      width: 100%; padding: 0.9rem; background: var(--green); color: #000;
      border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error {
      color: #ff7070; font-size: 0.85rem; margin-top: 0.75rem;
      background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px; padding: 0.6rem 0.8rem; display: none; width: 100%;
    }
    .hint-text { margin-top: 2rem; font-size: 0.8rem; color: var(--text-3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
      </svg>
    </div>
    <h1>Update <span>Brian's</span><br>Queue</h1>
    <p class="subtitle">Enter the access code to add songs to the queue</p>

    <div class="form-group">
      <label>Your name</label>
      <input type="text" id="name-input" placeholder="e.g. Sarah" autocomplete="off" maxlength="30" />
    </div>
    <div class="form-group">
      <label>Access code</label>
      <input type="text" id="code-input" placeholder="A1B2C3" maxlength="6" autocomplete="off" spellcheck="false" />
    </div>

    <button class="btn" id="submit-btn" onclick="submitCode()">Get Access</button>
    <div class="error" id="error-msg"></div>
    <p class="hint-text">Ask the host for the 6-character code</p>
  </div>

  <script>
    // If already have a valid session, skip straight to queue
    const sessionId = localStorage.getItem('queueSessionId');
    if (sessionId) {
      fetch('/api/access/check', { headers: { 'x-session-id': sessionId } })
        .then(r => r.json())
        .then(d => { if (d.valid) window.location.href = '/queue.html'; })
        .catch(() => {});
    }

    document.getElementById('code-input').addEventListener('input', e => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') submitCode(); });

    async function submitCode() {
      const name = document.getElementById('name-input').value.trim();
      const code = document.getElementById('code-input').value.trim();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');

      err.style.display = 'none';
      if (!name) { showError('Please enter your name.'); return; }
      if (code.length < 6) { showError('Please enter the full 6-character code.'); return; }

      btn.disabled = true;
      btn.textContent = 'Checking…';

      try {
        const res = await fetch('/api/access/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, name }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('queueSessionId', data.sessionId);
          localStorage.setItem('queueGuestName', data.name);
          localStorage.setItem('queueExpiresAt', data.expiresAt);
          window.location.href = '/queue.html';
        } else {
          showError(data.error || 'Invalid code.');
          btn.disabled = false;
          btn.textContent = 'Get Access';
        }
      } catch {
        showError('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Get Access';
      }
    }

    function showError(msg) {
      const err = document.getElementById('error-msg');
      err.textContent = msg;
      err.style.display = 'block';
    }
  </script>
</body>
</html>
